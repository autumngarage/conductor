# Optional repository secrets for this subprocess-adapter smoke:
# - ${{ secrets.ANTHROPIC_API_KEY }} for the `claude` CLI.
# - ${{ secrets.OPENAI_API_KEY }} for the `codex` CLI.
# - ${{ secrets.GEMINI_API_KEY }} for the `gemini` CLI.
# If any are missing, the workflow skips live smoke rather than failing and
# filing an issue. Forks and fresh repos often lack these secrets by design.
# Cloudflare secrets are intentionally not referenced here: this workflow does
# not exercise the Kimi/Cloudflare adapter, which is covered by validate.yml.
name: nightly-smoke

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  openrouter-stack-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Audit curated OpenRouter stacks
        id: stack_audit
        shell: bash
        run: |
          set +e
          uv run conductor models validate-stacks --json \
            > openrouter-stack-audit.json \
            2> openrouter-stack-audit.err
          status=$?
          cat openrouter-stack-audit.json
          cat openrouter-stack-audit.err
          exit "$status"

      - name: Open failure issue
        if: failure() && steps.stack_audit.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "Curated OpenRouter model stack audit failed."
            echo
            echo "Run: $RUN_URL"
            echo
            echo '```json'
            cat openrouter-stack-audit.json
            echo '```'
            if [ -s openrouter-stack-audit.err ]; then
              echo
              echo '```'
              cat openrouter-stack-audit.err
              echo '```'
            fi
          } > openrouter-stack-audit-issue.md

          if ! gh label list --search openrouter-stack-audit --json name --jq '.[].name' \
            | grep -qx openrouter-stack-audit; then
            gh label create openrouter-stack-audit \
              --description "Curated OpenRouter stack audit failure" \
              --color 6A4C93
          fi
          existing_issue="$(
            gh issue list \
              --state open \
              --label openrouter-stack-audit \
              --json number \
              --jq '.[0].number // empty'
          )"
          if [ -n "$existing_issue" ]; then
            gh issue comment "$existing_issue" --body-file openrouter-stack-audit-issue.md
          else
            gh issue create \
              --title "OpenRouter coding stack audit failed: $(date -u +%Y-%m-%d)" \
              --label openrouter-stack-audit \
              --body-file openrouter-stack-audit-issue.md
          fi

      - name: Log heartbeat
        if: success()
        run: |
          echo "OpenRouter stack audit passed at $(date -u --iso-8601=seconds)." >> "$GITHUB_STEP_SUMMARY"

  subprocess-adapter-live-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install provider CLIs
        run: npm install -g @anthropic-ai/claude-code @openai/codex @google/gemini-cli

      - name: Verify provider CLIs are installed
        shell: bash
        run: |
          missing=0
          for cli in claude codex gemini; do
            if ! command -v "$cli" >/dev/null 2>&1; then
              echo "::error::$cli CLI is missing after install"
              missing=1
            fi
          done
          exit "$missing"

      - name: Run live subprocess smoke
        id: live_smoke
        shell: bash
        env:
          RUN_LIVE_SMOKE: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set +e
          {
            missing=()
            for name in ANTHROPIC_API_KEY OPENAI_API_KEY GEMINI_API_KEY; do
              if [ -z "${!name}" ]; then
                echo "::notice::$name secret is not configured; skipping live subprocess smoke"
                missing+=("$name")
              fi
            done
            if [ "${#missing[@]}" -ne 0 ]; then
              {
                echo "Live subprocess smoke skipped because required repository secrets are not configured:"
                printf -- "- %s\n" "${missing[@]}"
                echo
                echo "Add these repository secrets, then re-run nightly-smoke manually or wait for the next schedule."
              } >> "$GITHUB_STEP_SUMMARY"
              touch live-smoke-skipped.txt
              exit 0
            fi

            uv run pytest -k live tests/test_adapters_subprocess.py
          } 2>&1 | tee live-smoke-output.txt
          status=${PIPESTATUS[0]}

          cp live-smoke-output.txt live-smoke-output-redacted.txt
          for name in ANTHROPIC_API_KEY OPENAI_API_KEY GEMINI_API_KEY GOOGLE_API_KEY; do
            value="${!name:-}"
            if [ -n "$value" ]; then
              SECRET_VALUE="$value" perl -0pi -e \
                's/\Q$ENV{SECRET_VALUE}\E/[redacted secret]/g' \
                live-smoke-output-redacted.txt
            fi
          done
          exit "$status"

      - name: Open failure issue
        if: failure() && steps.live_smoke.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "Nightly subprocess-adapter live smoke failed."
            echo
            echo "Run: $RUN_URL"
            echo
            echo '```'
            tail -c 60000 live-smoke-output-redacted.txt
            echo '```'
          } > live-smoke-issue.md

          if ! gh label list --search live-smoke-failure --json name --jq '.[].name' \
            | grep -qx live-smoke-failure; then
            gh label create live-smoke-failure \
              --description "Nightly conductor live smoke failure" \
              --color B60205
          fi
          existing_issue="$(
            gh issue list \
              --state open \
              --label live-smoke-failure \
              --json number \
              --jq '.[0].number // empty'
          )"
          if [ -n "$existing_issue" ]; then
            gh issue comment "$existing_issue" --body-file live-smoke-issue.md
          else
            gh issue create \
              --title "Live subprocess smoke failed: $(date -u +%Y-%m-%d)" \
              --label live-smoke-failure \
              --body-file live-smoke-issue.md
          fi

      - name: Log heartbeat
        if: success()
        run: |
          if [ -f live-smoke-skipped.txt ]; then
            echo "Live subprocess smoke skipped at $(date -u --iso-8601=seconds)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Live subprocess smoke passed at $(date -u --iso-8601=seconds)." >> "$GITHUB_STEP_SUMMARY"
          fi
