# Release workflow — auto-bumps the homebrew-conductor tap Formula
# whenever a GitHub Release is published in this repo.
#
# Two-step flow (machine handles only the deterministic half):
#   1. Human runs `gh release create v0.X.Y --generate-notes` on main.
#   2. The `release.published` event below fires; the shared workflow in
#      autumngarage/autumn-garage rewrites Formula/conductor.rb's `url`
#      + `sha256` and commits to the tap's main directly. Users running
#      `brew upgrade conductor` get the new version immediately.
#
# Manual escape hatch: trigger via the GitHub UI's `Run workflow` button
# (or `gh workflow run release.yml -f tag_name=v0.X.Y`) to re-bump for a
# tag whose original release event is gone or failed.
#
# Required secret on this repo: HOMEBREW_TAP_PAT — classic PAT with
# `repo` scope on autumngarage/homebrew-conductor (a fine-grained token
# with contents:write on that one repo also works).

name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to bump the formula to (e.g. v0.3.4). Required for manual runs."
        required: true
        type: string

permissions:
  contents: read

jobs:
  source-validation:
    # Validate the exact release tag before the tap is bumped. A GitHub
    # Release can still be created manually, but Homebrew promotion waits for
    # the internal suite to pass on the tag being published.
    if: github.event_name == 'workflow_dispatch' || !github.event.release.prerelease
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag_name || github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.event.release.tag_name }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pre-commit hygiene
        env:
          SKIP: no-commit-to-branch
        run: |
          pipx install pre-commit
          pre-commit run --all-files --hook-stage pre-commit --show-diff-on-failure

      - name: Run touchstone validate
        run: uv run bash scripts/touchstone-run.sh validate

      - name: Compile source and tests
        run: uv run python -m compileall -q src tests

  bump-tap:
    # On the auto-trigger, skip prereleases (RCs, betas) — they shouldn't
    # land in the tap. Manual dispatch always runs so we can re-bump on
    # demand for any tag.
    #
    # Inline bump (not the shared workflow @ autumn-garage): the
    # `mislav/bump-homebrew-formula-action` upstream pin (v4.1 / SHA
    # ccf2332299a883f6af50a1d2d41e5df7904dd769) has a hard-coded
    # `if (res.statusCode == 302)` check against GitHub's tarball
    # redirect. GitHub now returns HTTP 303 for codeload tarball
    # requests from GitHub Actions runners, so the action errors with
    # "unexpected HTTP 303 response" and never writes the formula.
    # See conductor v0.10.27 release run (2026-05-16) for repro.
    #
    # This job uses gh + curl directly: download the tagged tarball,
    # compute SHA256, rewrite the formula's `url` + `sha256` lines, and
    # PUT the new content via the GitHub Contents API. The shared
    # workflow at autumn-garage still calls the broken action; a port
    # of this same fix is in flight there.
    if: github.event_name == 'workflow_dispatch' || !github.event.release.prerelease
    needs: source-validation
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag_name || github.event.release.tag_name }}
      TAP_REPO: autumngarage/homebrew-conductor
      FORMULA_PATH: Formula/conductor.rb
      SOURCE_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ secrets.HOMEBREW_TAP_PAT }}
    steps:
      - name: Bump tap formula (curl + gh api)
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          tarball_url="https://github.com/${SOURCE_REPO}/archive/refs/tags/${RELEASE_TAG}.tar.gz"

          echo "::group::Download tarball and compute SHA256"
          curl -fL --retry 3 --retry-delay 2 "$tarball_url" -o /tmp/source.tar.gz
          sha256="$(sha256sum /tmp/source.tar.gz | awk '{print $1}')"
          echo "version=${version}  sha256=${sha256}"
          echo "::endgroup::"

          echo "::group::Fetch current formula"
          gh api "repos/${TAP_REPO}/contents/${FORMULA_PATH}" >/tmp/formula-meta.json
          jq -r '.content' /tmp/formula-meta.json | base64 -d >/tmp/formula.rb
          existing_sha="$(jq -r '.sha' /tmp/formula-meta.json)"
          echo "existing blob sha: ${existing_sha}"
          echo "::endgroup::"

          echo "::group::Rewrite url + sha256 lines"
          # `sed -E` with anchors so a stray `url`/`sha256` substring in
          # the caveats block can't be hit. POSIX `[[:space:]]` instead
          # of `\s` so the same script runs on BSD sed locally and GNU
          # sed in the runner.
          new_url="https://github.com/${SOURCE_REPO}/archive/refs/tags/${RELEASE_TAG}.tar.gz"
          sed -E -i \
            -e "s|^([[:space:]]*url )\"[^\"]+\"|\1\"${new_url}\"|" \
            -e "s|^([[:space:]]*sha256 )\"[0-9a-f]{64}\"|\1\"${sha256}\"|" \
            /tmp/formula.rb

          if ! grep -q "\"${new_url}\"" /tmp/formula.rb; then
            echo "::error::sed did not rewrite the url line; formula left unchanged"
            head -10 /tmp/formula.rb
            exit 1
          fi
          if ! grep -q "\"${sha256}\"" /tmp/formula.rb; then
            echo "::error::sed did not rewrite the sha256 line; formula left unchanged"
            head -10 /tmp/formula.rb
            exit 1
          fi
          echo "::endgroup::"

          echo "::group::PUT new formula content"
          new_content_b64="$(base64 -w0 </tmp/formula.rb)"
          commit_message="conductor ${version}

          Released by GitHub Actions from ${SOURCE_REPO}@${GITHUB_SHA}."
          gh api -X PUT "repos/${TAP_REPO}/contents/${FORMULA_PATH}" \
            -f message="$commit_message" \
            -f content="$new_content_b64" \
            -f sha="$existing_sha" \
            --jq '"committed " + .commit.sha + " — " + .commit.message'
          echo "::endgroup::"

  fresh-install-smoke:
    # This runs only after the reusable workflow has committed the formula
    # bump to the tap. It intentionally installs from Homebrew on a fresh
    # macOS runner rather than reusing this repo's source checkout.
    if: github.event_name == 'workflow_dispatch' || !github.event.release.prerelease
    needs: bump-tap
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ inputs.tag_name || github.event.release.tag_name }}

    steps:
      - name: Tap conductor
        timeout-minutes: 5
        run: brew tap autumngarage/conductor

      - name: Verify bumped formula is visible
        timeout-minutes: 5
        shell: bash
        run: |
          set -euo pipefail

          expected_version="${RELEASE_TAG#v}"

          # Re-tap to force a fresh fetch of the (just-bumped) tap repo;
          # `brew update <name>` interprets <name> as a formula to upgrade,
          # which fails with "no available formula" before the install step
          # has had a chance to install it.
          brew untap autumngarage/conductor || true
          brew tap autumngarage/conductor

          formula_version="$(
            brew info --json=v2 autumngarage/conductor/conductor \
              | python3 -c 'import json, sys; print(json.load(sys.stdin)["formulae"][0]["versions"]["stable"])'
          )"

          if [[ "$formula_version" != "$expected_version" ]]; then
            echo "::error::Homebrew formula version mismatch after brew update: expected ${expected_version} from tag ${RELEASE_TAG}, found ${formula_version}. The tap bump may not have propagated to the runner yet."
            brew tap-info autumngarage/conductor || true
            brew cat autumngarage/conductor/conductor || true
            exit 1
          fi

      - name: Install released conductor from Homebrew
        timeout-minutes: 5
        run: brew install autumngarage/conductor/conductor

      - name: Prepare local Ollama smoke provider
        timeout-minutes: 5
        shell: bash
        run: |
          set -euo pipefail

          brew install ollama
          ollama serve >ollama.log 2>&1 &
          echo "$!" >ollama.pid

          for _ in {1..30}; do
            if ollama list >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          if ! ollama list >/dev/null 2>&1; then
            echo "::error::ollama serve did not become ready within 30s"
            cat ollama.log >&2 || true
            exit 1
          fi

          ollama pull qwen2.5-coder:1.5b

      - name: Smoke released conductor
        timeout-minutes: 8
        shell: bash
        run: |
          set -euo pipefail

          expected_version="${RELEASE_TAG#v}"
          export CONDUCTOR_OLLAMA_MODEL="qwen2.5-coder:1.5b"

          assert_no_traceback() {
            local file="$1"
            local step="$2"
            if grep -qiE 'traceback \(most recent call last\)|ModuleNotFoundError|^[[:space:]]*File ".*", line [0-9]+' "$file"; then
              echo "::error::${step} printed a Python traceback; expected a clean CLI error"
              cat "$file" >&2 || true
              exit 1
            fi
          }

          assert_json_array() {
            local file="$1"
            local step="$2"
            python3 - "$file" "$step" <<'PY'
          import json
          import sys

          path, step = sys.argv[1], sys.argv[2]
          raw = open(path, encoding="utf-8").read().strip()
          if not raw:
              raise SystemExit(f"::error::{step} produced no output; expected a JSON array")
          try:
              payload = json.loads(raw)
          except json.JSONDecodeError as exc:
              raise SystemExit(f"::error::{step} output was not valid JSON: {exc}")
          if not isinstance(payload, list):
              raise SystemExit(f"::error::{step} output was {type(payload).__name__}; expected a JSON array")
          PY
          }

          set +e
          version_output="$(conductor --version 2>conductor-version.err)"
          version_status=$?
          set -e
          cat conductor-version.err >&2
          if [[ "$version_status" -ne 0 ]]; then
            echo "::error::conductor --version exited ${version_status}"
            exit "$version_status"
          fi
          echo "$version_output"
          if [[ "$version_output" != *"$expected_version"* ]]; then
            echo "::error::conductor --version output did not contain expected version ${expected_version} from tag ${RELEASE_TAG}: ${version_output}"
            exit 1
          fi

          set +e
          conductor list 2>conductor-list.err
          list_status=$?
          set -e
          cat conductor-list.err >&2
          if [[ "$list_status" -ne 0 ]]; then
            echo "::error::conductor list exited ${list_status}"
            exit "$list_status"
          fi

          set +e
          conductor doctor 2>conductor-doctor.err
          doctor_status=$?
          set -e
          cat conductor-doctor.err >&2
          if [[ "$doctor_status" -ne 0 ]]; then
            echo "::error::conductor doctor exited ${doctor_status}"
            exit "$doctor_status"
          fi

          dispatch_cache="$(mktemp -d)"
          set +e
          XDG_CACHE_HOME="$dispatch_cache" conductor ask \
            --kind research \
            --effort minimal \
            --offline \
            --task "Reply OK." \
            >conductor-ask.out \
            2>conductor-ask.err
          ask_status=$?
          set -e
          cat conductor-ask.err >&2
          assert_no_traceback conductor-ask.err "conductor ask --kind research --effort minimal --offline"
          if [[ "$ask_status" -ne 0 ]]; then
            echo "::error::conductor ask --kind research --effort minimal --offline exited ${ask_status}; expected exit 0"
            cat conductor-ask.out
            exit "$ask_status"
          fi
          if [[ ! -s conductor-ask.out ]]; then
            echo "::error::conductor ask --kind research --effort minimal --offline produced empty stdout; expected provider response text"
            exit 1
          fi
          cat conductor-ask.out

          set +e
          conductor exec \
            --with codex \
            --tools Read \
            --task "List one file." \
            --json \
            >conductor-exec-codex.out \
            2>conductor-exec-codex.err
          exec_status=$?
          set -e
          cat conductor-exec-codex.err >&2
          assert_no_traceback conductor-exec-codex.err "conductor exec --with codex --json"
          assert_no_traceback conductor-exec-codex.out "conductor exec --with codex --json"
          if [[ "$exec_status" -eq 0 ]]; then
            echo "::error::conductor exec --with codex --json exited 0; expected non-zero with codex unconfigured"
            cat conductor-exec-codex.out
            exit 1
          fi
          if [[ ! -s conductor-exec-codex.err && ! -s conductor-exec-codex.out ]]; then
            echo "::error::conductor exec --with codex --json produced no error output; expected a clean structured error message"
            exit 1
          fi
          if [[ -s conductor-exec-codex.out ]]; then
            python3 -m json.tool conductor-exec-codex.out >/dev/null || {
              echo "::error::conductor exec --with codex --json stdout was not valid JSON when stdout was present"
              cat conductor-exec-codex.out
              exit 1
            }
          elif ! grep -qE '^\[conductor\] preflight failed for codex:|^conductor:' conductor-exec-codex.err; then
            echo "::error::conductor exec --with codex --json stderr did not contain conductor's clean error prefix"
            cat conductor-exec-codex.err >&2
            exit 1
          fi

          fresh_cache="$(mktemp -d)"
          set +e
          XDG_CACHE_HOME="$fresh_cache" conductor delegations list --json \
            >conductor-delegations.out \
            2>conductor-delegations.err
          delegations_status=$?
          set -e
          cat conductor-delegations.err >&2
          assert_no_traceback conductor-delegations.err "conductor delegations list --json"
          if [[ "$delegations_status" -ne 0 ]]; then
            echo "::error::conductor delegations list --json exited ${delegations_status}; expected exit 0 for a fresh ledger"
            cat conductor-delegations.out
            exit "$delegations_status"
          fi
          assert_json_array conductor-delegations.out "conductor delegations list --json"
          python3 - <<'PY'
          import json

          with open("conductor-delegations.out", encoding="utf-8") as fh:
              payload = json.load(fh)
          if payload:
              raise SystemExit(
                  "::error::conductor delegations list --json returned entries for a fresh ledger; expected []"
              )
          PY

          sessions_cache="$(mktemp -d)"
          set +e
          XDG_CACHE_HOME="$sessions_cache" conductor sessions list --since 1h \
            >conductor-sessions.out \
            2>conductor-sessions.err
          sessions_status=$?
          set -e
          cat conductor-sessions.err >&2
          assert_no_traceback conductor-sessions.err "conductor sessions list --since 1h"
          if [[ "$sessions_status" -ne 0 ]]; then
            echo "::error::conductor sessions list --since 1h exited ${sessions_status}; expected exit 0 for an empty cache"
            cat conductor-sessions.out
            exit "$sessions_status"
          fi
