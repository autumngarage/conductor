name: validate

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      run_live_smoke:
        description: "Run the live Cloudflare smoke test (burns a 1-token call)"
        type: boolean
        default: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pre-commit hygiene
        # `no-commit-to-branch` always fails on main pushes by definition —
        # it's the local-developer guard against direct commits, not a CI
        # check. PRs run on feature branches so the hook is silent there;
        # only post-merge main pushes hit it. Skip explicitly in CI.
        env:
          SKIP: no-commit-to-branch
        run: |
          pipx install pre-commit
          pre-commit run --all-files --hook-stage pre-commit --show-diff-on-failure

      - name: Run touchstone validate
        # Touchstone is the project validation source of truth. For this
        # Python profile it runs Ruff, mypy, and pytest, so keep those checks
        # centralized instead of duplicating them as separate CI steps.
        run: bash scripts/touchstone-run.sh validate

  live-smoke:
    # Only runs on manual dispatch with the checkbox enabled — live calls cost
    # real tokens and the Kimi endpoint is quota-constrained. Mocked tests in
    # Touchstone's validate pass cover every adapter path on every push/PR.
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_smoke == true
    runs-on: ubuntu-latest
    needs: validate
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install conductor
        run: uv sync

      - name: Live smoke — conductor call --with kimi
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets must be set on the repo"
            exit 1
          fi
          uv run conductor call --with kimi --task "Reply with exactly the word OK." --json
